services:
  db:
    image: ankane/pgvector:latest
    container_name: nook_db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: nook_user
      POSTGRES_PASSWORD: fP4!7zzYWfTW
      POSTGRES_DB: nook_db
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nook_user -d nook_db"]
      interval: 5s
      timeout: 5s
      retries: 5  

  backend:
    build: ./backend
    container_name: nook_backend
    ports:
      - "8080:8080"
    volumes:
      - ./backend:/app
    env_file:
      - ./backend/.env

    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_SOURCE: "postgresql://nook_user:fP4!7zzYWfTW@db:5432/nook_db?sslmode=disable"
      GOOGLE_APPLICATION_CREDENTIALS: "/app/secrets/service-account.json"
      GEMINI_API_KEY: "YOUR_GEMINI_API_KEY"

volumes:
  pgdata: